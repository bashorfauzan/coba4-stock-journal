[build]
builder = "nixpacks"
buildCommand = "npm install && npm install --prefix client && npm install --prefix server && npm run build"

[build.env]
NIXPACKS_NODE_VERSION = "20"

[deploy]
startCommand = "npm run start"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
